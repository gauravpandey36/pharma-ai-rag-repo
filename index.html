body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:#e2e8f0;min-height:100vh}
header{padding:32px 24px;text-align:center;background:rgba(0,0,0,.3);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.1)}

.card:hover{transform:translateY(-4px);background:rgba(255,255,255,.1);border-color:rgba(96,165,250,.4);box-shadow:0 10px 30px rgba(0,0,0,.4)}

.tag.region{background:rgba(96,165,250,.2);color:#93c5fd}
.tag.mode{background:rgba(167,139,250,.2);color:#c4b5fd}
.tag.cost{background:rgba(52,211,153,.2);color:#6ee7b7}
.tag.prio-H{background:rgba(248,113,113,.25);color:#fca5a5}

.card .row b{color:#cbd5e1;min-width:60px}
.card .focus{font-size:12px;color:#a5b4fc;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);font-style:italic}
.prio-badge{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.prio-badge.H{background:#ef4444;color:#fff}
.prio-badge.M{background:#f59e0b;color:#fff}
.empty{text-align:center;padding:60px;color:#64748b;grid-column:1/-1}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}

\u201312 Nov 2026", "location": "Europe [TBC]", "region": "VIR", "mode": "In-Person", "cost": "Paid TBC", "focus": "AI in GxP / EU Annex 22 / GAMP AI Guide / ML Validation", "audience": "Validation \u00b7 QA \u00b7 Manufacturing \u00b7 Regulatory", "priority": "H", "notes": "", "source": "External Engagement Map"}, {"name": "MedSafetyWeek 2026", "organizer": "Uppsala Monitoring Centre / WHO (10+y)", "type": "Global Awareness Week", "dates": "02\u201308 Nov 2026", "location": "Global / Online", "region": "VIR", "mode": "Hybrid", "cost": "Free", "focus": "Adverse Event Reporting / Patient Safety / PV", "audience": "Drug Safety \u00b7 PV \u00b7 Medical Affairs", "priority": "M", "notes": "", "source": "External Engagement Map"}];
const $ = id => document.getElementById(id);
const uniq = arr => [...new Set(arr.filter(Boolean))].sort();

// Populate filters
uniq(EVENTS.map(e=>e.region)).forEach(v=>$('fRegion').innerHTML+=`<option>${v}</option>`);
uniq(EVENTS.map(e=>e.type.split(/[·,]/)[0].trim())).filter(v=>v.length<30).forEach(v=>$('fType').innerHTML+=`<option>${v}</option>`);

// Stats
const stats = [
  ['Total Events',EVENTS.length],
  ['Regions',uniq(EVENTS.map(e=>e.region)).length],
  ['High Priority',EVENTS.filter(e=>e.priority==='H').length],
  ['Sources',3]
];
$('stats').innerHTML = stats.map(([l,v])=>`<div class="stat"><b>${v}</b>${l}</div>`).join('');

// Quick chips
const CHIPS=['All','High Priority','Free','Hybrid','Supply','Manufacturing','Quality','Regulatory','AI/ML'];
let activeChip='All';
$('chips').innerHTML=CHIPS.map(c=>`<div class="chip ${c==='All'?'active':''}" data-c="${c}">${c}</div>`).join('');
$('chips').addEventListener('click',e=>{
  if(!e.target.dataset.c)return;
  activeChip=e.target.dataset.c;
  document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.c===activeChip));
  render();
});

function match(e){
  const q=$('search').value.toLowerCase();
  if(q && !`${e.name} ${e.organizer} ${e.focus} ${e.location} ${e.notes}`.toLowerCase().includes(q))return false;
  if($('fRegion').value && e.region!==$('fRegion').value)return false;
  const dept=$('fDept').value;
  if(dept && !`${e.focus} ${e.audience} ${e.type}`.toLowerCase().includes(dept.toLowerCase()))return false;
  if($('fType').value && !e.type.toLowerCase().includes($('fType').value.toLowerCase()))return false;
  if($('fMonth').value && !e.dates.toLowerCase().includes($('fMonth').value.toLowerCase()))return false;
  if($('fMode').value && !e.mode.toLowerCase().includes($('fMode').value.toLowerCase()))return false;
  const cost=$('fCost').value;
  if(cost==='Free' && !/free/i.test(e.cost))return false;
  if(cost==='Paid' && /free/i.test(e.cost))return false;
  if(activeChip!=='All'){
    if(activeChip==='High Priority' && e.priority!=='H')return false;
    else if(activeChip==='Free' && !/free/i.test(e.cost))return false;
    else if(activeChip==='Hybrid' && !/hybrid/i.test(e.mode))return false;
    else if(!['High Priority','Free','Hybrid'].includes(activeChip) && !`${e.focus} ${e.audience} ${e.type}`.toLowerCase().includes(activeChip.toLowerCase()))return false;
  }
  return true;
}

function render(){
  const list=EVENTS.filter(match);
  $('count').textContent=`Showing ${list.length} of ${EVENTS.length} events`;
  if(!list.length){$('grid').innerHTML='<div class="empty">No events match your filters. Try broadening your search.</div>';return;}
  $('grid').innerHTML=list.map((e,i)=>`
    <div class="card" onclick="showModal(${EVENTS.indexOf(e)})">
      ${e.priority?`<div class="prio-badge ${e.priority}">${e.priority}</div>`:''}
      <h3>${e.name}</h3>
      <div class="meta">
        ${e.region?`<span class="tag region">${e.region}</span>`:''}
        ${e.mode?`<span class="tag mode">${e.mode}</span>`:''}
        ${e.cost?`<span class="tag cost">${e.cost}</span>`:''}
      </div>
      <div class="row"><b>📅 Date</b>${e.dates||'TBD'}</div>
      <div class="row"><b>📍 Where</b>${e.location||'—'}</div>
      <div class="row"><b>🏛 Org</b>${e.organizer||'—'}</div>
      ${e.focus?`<div class="focus">${e.focus}</div>`:''}
    </div>
  `).join('');
}

function showModal(i){
  const e=EVENTS[i];
  $('modalBody').innerHTML=`
    <button class="close" onclick="closeModal()">×</button>
    <h2>${e.name}</h2>
    <div class="field"><b>Organizer</b>${e.organizer||'—'}</div>
    <div class="field"><b>Type</b>${e.type||'—'}</div>
    <div class="field"><b>Dates</b>${e.dates||'—'}</div>
    <div class="field"><b>Location</b>${e.location||'—'} (${e.region})</div>
    <div class="field"><b>Mode</b>${e.mode||'—'}</div>
    <div class="field"><b>Cost</b>${e.cost||'—'}</div>
    <div class="field"><b>Focus Areas</b>${e.focus||'—'}</div>
    <div class="field"><b>Target Audience</b>${e.audience||'—'}</div>
    <div class="field"><b>Strategic Priority</b>${e.priority||'—'}</div>
    <div class="field"><b>Notes</b>${e.notes||'—'}</div>
    <div class="field"><b>Source Document</b>${e.source}</div>
  `;
  $('modal').classList.add('active');
}
function closeModal(){$('modal').classList.remove('active')}

['search','fRegion','fDept','fType','fMonth','fMode','fCost'].forEach(id=>$(id).addEventListener('input',render));
render();
</script>
